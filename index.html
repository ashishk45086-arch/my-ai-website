<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pg in Phagwara</title>
    <script>
      (function() {
        // Safe window.fetch patch to prevent "only a getter" runtime errors
        try {
          let originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get() {
              return originalFetch;
            },
            set(newFetch) {
              originalFetch = newFetch;
            }
          });
        } catch (e) {
          console.warn("Could not redefine window.fetch:", e);
        }

        try {
          const cached = localStorage.getItem('pg_theme');
          if (cached && cached !== 'default') {
            document.documentElement.setAttribute('data-theme', cached);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
